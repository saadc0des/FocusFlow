name: Build FocusFlow APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME
          echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Install Android platform and build tools
        run: |
          yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_HOME

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FocusFlow-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
